<div class="fb-action">
  {% if page.path contains '_post' %}
    <div class="fb-like"
      data-href="{{ page.url | absolute_url }}"
      data-layout="button"
      data-action="like"
      data-size="small"
      data-show-faces="true"
      data-share="true">
    </div>
  {% else %}
    <amp-facebook-like
      width="100"
      height="22"
      layout="fixed"
      data-layout="button"
      data-href="{{ page.url | absolute_url }}"
      data-size="small"
      data-show-faces="true"
      data-share="true">
    </amp-facebook-like>
  {% endif %}
</div>
