{% if page.path contains '_post' %}
  <div align="center">
    <script async src="//pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
    <!-- Ad below article -->
    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-{{site.google_adSense}}"
      data-ad-slot="1800712192"
      data-ad-format="auto"
      data-full-width-responsive="true"></ins>
    <script>
    (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>
{% else %}
  <amp-auto-ads type="adsense" data-ad-client="ca-{{site.google_adSense}}"></amp-auto-ads>
{% endif %}
