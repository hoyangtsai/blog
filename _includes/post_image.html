{% if page.path contains '_amp' %}
  {% if include.src contains 'http' %}
  <amp-img src="{{ include.src }}"
    width="{{ include.width }}"
    height="{{ include.height }}"
    alt="{{ include.alt }}"
    class="amp-img"
    layout="{{ include.layout | default: 'responsive' }}"></amp-img>
  {% else %}
  <amp-img
    src="{{ include.src | prepend: site.baseurl }}"
    width="{{ include.width }}"
    height="{{ include.height }}"
    alt="{{ include.alt }}"
    class="amp-img"
    layout="{{ include.layout | default: 'responsive' }}"></amp-img>
  {% endif %}
{% else %}
  {% if include.src contains 'http' %}
  <img class="{{ include.class }}"
    src="{{ include.src }}"
    alt="{{ include.alt }}"
    width="{{ include.width | default: '100%' }}"
    height="{{ include.height |  default: 'auto' }}" />
  {% else %}
  <img class="{{ include.class }}"
    src="{{ include.src | prepend: site.baseurl }}"
    alt="{{ include.alt }}"
    width="{{ include.width | default: '100%' }}"
    height="{{ include.height | default: 'auto' }}" />
  {% endif %}
{% endif %}
