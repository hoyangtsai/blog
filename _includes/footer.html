<footer>
  {% if site.github.is_project_page %}
    <a href="{{ site.github.repository_url }}" id="view-on-github" class="button"><span>View on GitHub</span></a>
  {% endif %}
  {% if site.github.is_project_page %}
  <p>{{ site.title | default: site.github.repository_name }} is maintained by <a href="{{ site.github.owner_url }}">{{
    site.github.owner_name }}</a></p>
  {% endif %}
</footer>
