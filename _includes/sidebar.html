<aside id="sidenav-open">
  <nav>
    <h4>Menu</h4>
    <a class="{% if page.title == 'Home' %} active{% endif %}" href="{{ '/' | absolute_url }}">
      <i class="fas fa-home"></i>&nbsp;&nbsp;
      <span class="sidenav-title">Home</span>
    </a>
    <a class="{% if page.title == 'Posts' %} active{% endif %}" href="{{ 'posts' | absolute_url }}">
      <i class="fas fa-pencil-alt"></i>&nbsp;&nbsp;
      <span class="sidenav-title">Posts</span>
    </a>
    {% assign pages_list = site.pages | sort:"url" %}
    {% for node in pages_list %}
      {% if node.title != null %}
        {% if node.layout == "page" %}
          <a class="{% if page.url == node.url %} active{% endif %}"
            href="{{ node.url | prepend: site.baseurl }}"
          >
            <i class="fas {{ 'fa-' | append: node.title | downcase }}"></i>&nbsp;&nbsp;
            <span class="sidenav-title">{{ node.title }}</span>
          </a>
        {% endif %}
      {% endif %}
    {% endfor %}

    <!-- <div class="sidenav-footer">
      <a class="" href="{{ site.github.repo }}">
        <span class="sidenav-title">Source repo</span></a>
    </div> -->

    <!-- <p>&copy; {{ site.time | date: '%Y' }}. All rights reserved.</p> -->
  </nav>

  <a href="#" id="sidenav-close" title="Close Menu" aria-label="Close Menu"></a>
</aside>
