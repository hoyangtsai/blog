<div class="fb-action">
  {% if page.path contains '_post' %}
    <div class="fb-like" data-href="{{ site.url }}{{ page.url | remove: site.ampdir }}" data-layout="button" data-action="like" data-size="small" data-show-faces="true" data-share="true"></div>
  {% else %}
    <amp-facebook-like width="100" height="22"
      layout="fixed"
      data-layout="button"
      data-href="{{ site.url }}{{ page.url | remove: site.ampdir }}"
      data-size="small"
      data-show-faces="true"
      data-share="true">
    </amp-facebook-like>
  {% endif %}
</div>
